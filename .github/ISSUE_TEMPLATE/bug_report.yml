name: Bug report
description: Report incorrect behavior or a crash
title: "[bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: GoKafka version
      placeholder: e.g. v0.19.0
    validations:
      required: true
  - type: input
    id: go
    attributes:
      label: Go version
      placeholder: e.g. 1.24.2
    validations:
      required: true
  - type: input
    id: kafka
    attributes:
      label: Kafka broker version
      placeholder: e.g. apache/kafka:4.3.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
